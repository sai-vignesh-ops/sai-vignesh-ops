<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" width="420" height="340" role="img" aria-label="Top languages">
<defs>
<style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#ff7eb6;#c084fc;#ff7eb6" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#c084fc;#ff7eb6;#c084fc" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".08"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
<clipPath id="cardc"><rect x="1" y="1" width="418" height="338" rx="14"/></clipPath>
<clipPath id="stackc"><rect x="20" y="58" width="0" height="11" rx="5.5"><animate attributeName="width" from="0" to="380" dur="1.4s" begin=".4s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/></rect></clipPath>
</defs>
<rect x="1" y="1" width="418" height="338" rx="14" fill="#170e28" stroke="url(#tg)" stroke-width="1.5"/>
<text x="20" y="34" font-size="16" font-weight="bold" fill="url(#tg)">📊 Top Languages</text>

<!-- Stacked bar at top (scaled to 100% for visual overview) -->
<g clip-path="url(#stackc)">
  <rect x="20.0" y="58" width="361.0" height="11" fill="#ff7a59"/>
  <rect x="381.0" y="58" width="15.2" height="11" fill="#c084fc"/>
  <rect x="396.2" y="58" width="3.8" height="11" fill="#7db8ff"/>
</g>

<!-- HTML - 95% -->
<g class="row" style="animation-delay:0.90s">
  <circle cx="26" cy="91" r="5" fill="#ff7a59"/>
  <text x="40" y="96" font-size="13" fill="#e6edf3" font-weight="bold">HTML</text>
  <text x="396" y="96" text-anchor="end" font-size="13" fill="#ff7a59" font-weight="bold">95.0%</text>
  <rect x="40" y="104" width="268" height="9" rx="4.5" fill="#241740"/>
  <rect class="bar" x="40" y="104" width="254.6" height="9" rx="4.5" fill="#ff7a59" style="animation-delay:1.05s">
    <animate attributeName="width" from="0" to="254.6" dur="1.1s" begin="1.05s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- Python - 85% -->
<g class="row" style="animation-delay:1.25s">
  <circle cx="26" cy="133" r="5" fill="#c084fc"/>
  <text x="40" y="138" font-size="13" fill="#e6edf3" font-weight="bold">Python</text>
  <text x="396" y="138" text-anchor="end" font-size="13" fill="#c084fc" font-weight="bold">85.0%</text>
  <rect x="40" y="146" width="268" height="9" rx="4.5" fill="#241740"/>
  <rect class="bar" x="40" y="146" width="227.8" height="9" rx="4.5" fill="#c084fc" style="animation-delay:1.40s">
    <animate attributeName="width" from="0" to="227.8" dur="1.1s" begin="1.40s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- React - 70% -->
<g class="row" style="animation-delay:1.60s">
  <circle cx="26" cy="175" r="5" fill="#61dafb"/>
  <text x="40" y="180" font-size="13" fill="#e6edf3" font-weight="bold">React</text>
  <text x="396" y="180" text-anchor="end" font-size="13" fill="#61dafb" font-weight="bold">70.0%</text>
  <rect x="40" y="188" width="268" height="9" rx="4.5" fill="#241740"/>
  <rect class="bar" x="40" y="188" width="187.6" height="9" rx="4.5" fill="#61dafb" style="animation-delay:1.75s">
    <animate attributeName="width" from="0" to="187.6" dur="1.1s" begin="1.75s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- JavaScript - 80% -->
<g class="row" style="animation-delay:1.95s">
  <circle cx="26" cy="217" r="5" fill="#fde047"/>
  <text x="40" y="222" font-size="13" fill="#e6edf3" font-weight="bold">JavaScript</text>
  <text x="396" y="222" text-anchor="end" font-size="13" fill="#fde047" font-weight="bold">80.0%</text>
  <rect x="40" y="230" width="268" height="9" rx="4.5" fill="#241740"/>
  <rect class="bar" x="40" y="230" width="214.4" height="9" rx="4.5" fill="#fde047" style="animation-delay:2.10s">
    <animate attributeName="width" from="0" to="214.4" dur="1.1s" begin="2.10s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- TypeScript - 2% -->
<g class="row" style="animation-delay:2.25s">
  <circle cx="26" cy="259" r="5" fill="#7db8ff"/>
  <text x="40" y="264" font-size="13" fill="#e6edf3" font-weight="bold">TypeScript</text>
  <text x="396" y="264" text-anchor="end" font-size="13" fill="#7db8ff" font-weight="bold">2.0%</text>
  <rect x="40" y="272" width="268" height="9" rx="4.5" fill="#241740"/>
  <rect class="bar" x="40" y="272" width="5.4" height="9" rx="4.5" fill="#7db8ff" style="animation-delay:2.40s">
    <animate attributeName="width" from="0" to="5.4" dur="1.1s" begin="2.40s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </rect>
</g>

<!-- Shine overlay -->
<g clip-path="url(#cardc)">
  <rect class="sh" x="0" y="0" width="100" height="340" fill="url(#shg)" transform="skewX(-15)"/>
</g>
</svg>